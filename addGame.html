<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

    <title>Document</title>
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #000000;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
    </style>
</head>
<body>
    <div class="nvidia-card-container">
        <div class="nvidia-card">
            <h1>Adicionar Jogo</h1>
            <form id="add-game-form">
                <div class="nvidia-field">
                    <label for="nome">Nome do Jogo</label>
                    <input type="text" id="nome" name="nome" required>
                </div>
                <div class="nvidia-field">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" name="descricao" rows="4" required></textarea>
                </div>
                <div class="nvidia-field">
                    <label for="preco">Preço</label>
                    <input type="number" id="preco" name="preco" step="0.01" required>
                </div>
                <div class="nvidia-field">
                    <label for="urlImagem">URL da Imagem</label>
                    <input type="url" id="urlImagem" name="urlImagem" required>
                </div>
                <div class="nvidia-field">
                    <label for="urlSteam">URL da Steam</label>
                    <input type="url" id="urlSteam" name="urlSteam" required>
                </div>
                <button type="submit">Adicionar Jogo</button>
            </form>
        </div>
    </div>
</body>
</html>
